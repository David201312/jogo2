<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Sentinel | Mission Start</title>
    <meta name="description" content="Void Sentinel - A Sci-Fi FPS game built with Three.js">
    <link rel="stylesheet" href="./style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Orbitron:wght@500;700;900&display=swap"
        rel="stylesheet">
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>

<body>
    <div id="app">
        <!-- Click to play overlay -->
        <div id="start-overlay">
            <h1 class="game-title">VOID SENTINEL</h1>
            <p class="start-hint">Click to start — WASD to move, Mouse to aim, Click to shoot</p>
            <p class="start-sub">SHIFT = Sprint &nbsp;|&nbsp; SPACE = Jump</p>
        </div>

        <div id="hud" style="display:none;">
            <div id="enemy-counter">
                Threats Remaining: <span id="enemy-count">0</span>
            </div>

            <div id="message-overlay">
                <h1 id="mission-status" class="mission-text">MISSION ACCOMPLISHED</h1>
            </div>

            <div id="crosshair">
                <div class="crosshair-part crosshair-v" id="crosshair-top"></div>
                <div class="crosshair-part crosshair-v" id="crosshair-bottom"></div>
                <div class="crosshair-part crosshair-h" id="crosshair-left"></div>
                <div class="crosshair-part crosshair-h" id="crosshair-right"></div>
                <div class="crosshair-part" id="crosshair-center"></div>
            </div>

            <div class="hud-bottom">
                <!-- Bottom Left: Health -->
                <div class="stat-container" id="health-container">
                    <div class="stat-label">Sentinel Vitals</div>
                    <div class="stat-bar-outer" id="health-bar">
                        <div class="stat-bar-inner" id="health-fill" style="width: 100%;"></div>
                    </div>
                    <div class="stat-value">HP <span id="health-value">100</span></div>
                </div>

                <!-- Bottom Center: Weapon -->
                <div class="stat-container weapon-info">
                    <div class="stat-label">Weapon</div>
                    <div class="stat-value weapon-name" id="weapon-name">PISTOL</div>
                </div>

                <!-- Bottom Right: Armor -->
                <div class="stat-container" id="armor-container">
                    <div class="stat-label">Plating Integrity</div>
                    <div class="stat-bar-outer" id="armor-bar">
                        <div class="stat-bar-inner" id="armor-fill" style="width: 0%;"></div>
                    </div>
                    <div class="stat-value">AP <span id="armor-value">0</span></div>
                </div>
            </div>
        </div>
    </div>
    <script type="module" src="/src/main.js"></script>
    <script>
        document.addEventListener('pointerlockchange', () => {
            const hud = document.getElementById('hud');
            const overlay = document.getElementById('start-overlay');
            if (document.pointerLockElement) {
                hud.style.display = 'flex';
                overlay.style.display = 'none';
            } else {
                overlay.style.display = 'flex';
            }
        });
    </script>
</body>

</html>
